version: "3.9"

name: deppi-api
services:
  postgres:
    image: postgres:18
    container_name: deppi-api
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apideppi
    ports:
      - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/

volumes:
  postgres_data: